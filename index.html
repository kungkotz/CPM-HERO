<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Side Loadplan Reconciler & Automated Checker</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent: #00adb5;
            --text: #eeeeee;
            --success: #4caf50;
            --error: #f44336;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        @media (max-width: 1024px) {
            .container { grid-template-columns: 1fr; }
        }
        .panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .image-split-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        @media (max-width: 600px) {
            .image-split-container { grid-template-columns: 1fr; }
        }
        .upload-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .upload-zone {
            border: 2px dashed #444;
            padding: 40px 10px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            background: #171717;
            transition: all 0.2s ease;
        }
        .upload-zone:hover { 
            border-color: var(--accent); 
            background: #222;
        }
        .preview-img {
            width: 100%;
            max-height: 65vh;
            object-fit: contain;
            border-radius: 4px;
            display: none;
            border: 1px solid #333;
            margin-top: 5px;
        }
        h2 { margin-top: 0; color: var(--accent); border-bottom: 1px solid #333; padding-bottom: 8px;}
        h3 { margin: 0 0 5px 0; font-size: 14px; color: #ccc; }
        .form-group {
            margin-bottom: 15px;
            background: #252525;
            padding: 12px;
            border-radius: 6px;
        }
        .hold-title { font-weight: bold; margin-bottom: 8px; color: var(--accent); display: flex; justify-content: space-between;}
        .grid-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 5px;
        }
        label { font-size: 12px; color: #aaa; display: block; margin-bottom: 2px; }
        input {
            width: 100%;
            background: #333;
            border: 1px solid #444;
            color: #fff;
            padding: 6px;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--accent); outline: none; }
        .status-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .match { background: var(--success); color: white; }
        .mismatch { background: var(--error); color: white; }
        .info-box {
            background: #1a2a3a;
            border-left: 4px solid var(--accent);
            padding: 10px;
            margin-bottom: 15px;
            font-size: 13px;
            border-radius: 0 4px 4px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h2>1. Loadplan Reference Views</h2>
        <div class="image-split-container">
            
            <div class="upload-box">
                <h3>Side A (ULD Numbers)</h3>
                <div class="upload-zone" id="dropzoneA">
                    <p style="pointer-events: none; margin: 0;">📸 Click or Drop Here</p>
